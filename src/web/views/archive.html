<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>归档记录 · Jarvis Engine</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#6366F1',primary2:'#818CF8',cta:'#10B981',surface:'#FFFFFF',text:'#1E1B4B',muted:'#64748B'},fontFamily:{sans:['Inter','system-ui','sans-serif'],mono:['JetBrains Mono','Fira Code','monospace']}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { scrollbar-width: thin; scrollbar-color: #CBD5E1 transparent; }
  .toast-in { animation:slideIn .25s ease-out; }
  @keyframes slideIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex h-screen overflow-hidden">

<!-- ===== 左侧边栏 ===== -->
<aside class="w-72 min-w-[288px] bg-white text-slate-700 flex flex-col h-full z-10 border-r border-slate-200 shadow-sm">
  <!-- Logo 区域 -->
  <div class="px-5 py-5 border-b border-slate-100">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/25">
        <i data-lucide="zap" class="w-5 h-5 text-white"></i>
      </div>
      <div>
        <h1 class="text-[15px] font-bold text-slate-800 leading-tight font-mono tracking-tight">Jarvis Engine</h1>
        <p class="text-[11px] text-slate-400 font-mono" id="verNum">v3.22.0</p>
      </div>
    </div>
  </div>

  <!-- 导航 -->
  <nav class="px-3 py-4 flex flex-col gap-0.5">
    <a href="/dashboard" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 border-l-[3px] border-transparent transition-colors">
      <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
      流水线看板
    </a>
    <a href="/agents" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 border-l-[3px] border-transparent transition-colors">
      <i data-lucide="bot" class="w-4 h-4"></i>
      智能体配置
    </a>
    <a href="/archive" class="flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm font-medium bg-indigo-50 text-indigo-600 border-l-[3px] border-indigo-500 transition-colors">
      <i data-lucide="archive" class="w-4 h-4"></i>
      归档记录
    </a>
  </nav>

  <!-- 页脚信息 -->
  <div class="mt-auto px-4 py-3 border-t border-slate-100">
    <p class="text-[10px] text-slate-400 font-mono text-center">Jarvis Engine · MCP :3456</p>
  </div>
</aside>

<!-- ===== 主内容区域 ===== -->
<main class="flex-1 overflow-y-auto bg-slate-50">
  <div class="max-w-5xl mx-auto px-8 py-8">

    <!-- 页面标题 -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <h2 class="text-2xl font-bold text-slate-800">归档记录</h2>
        <span class="px-2.5 py-0.5 text-[11px] font-medium bg-amber-100 text-amber-700 rounded-full">已归档运行</span>
      </div>
      <div class="flex items-center gap-3">
        <!-- 搜索框 -->
        <div class="relative">
          <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input type="text" id="searchInput" placeholder="按任务名称过滤..." oninput="applyFilter()" class="w-56 pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-lg bg-white focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition-all font-sans placeholder-slate-400">
        </div>
        <span class="text-xs text-slate-400 font-mono" id="archiveCount">0 条记录</span>
      </div>
    </div>

    <!-- 归档列表 -->
    <div id="archiveList" class="space-y-4">
      <div class="text-center py-16 text-slate-400">
        <i data-lucide="archive" class="w-12 h-12 mx-auto mb-4 text-slate-300"></i>
        <p class="text-sm font-medium">加载中...</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="mt-8 pt-6 border-t border-slate-200 text-xs text-slate-400 flex items-center justify-between">
      <span class="font-mono">归档记录 · 只读查看</span>
      <span>
        <a href="/dashboard" class="text-indigo-500 hover:text-indigo-600 transition-colors font-medium">返回看板</a>
        <span class="mx-2 text-slate-300">·</span>
        <span>会话隔离模式</span>
      </span>
    </footer>
  </div>
</main>

<!-- Toast 容器 -->
<div id="toastContainer" class="fixed bottom-6 right-6 z-[300] flex flex-col gap-2"></div>

<script>
/** 流水线类型中文名 */
var PIPELINE_NAMES = {
  'full': '完整流水线',
  'frontend': '前端流水线',
  'backend': '后端流水线',
  'lite': '轻量流水线',
};

/** 指令标签：pipeline_type → { label, class } */
var COMMAND_LABELS = {
  'full':     { label: '/jarvis',       cls: 'indigo' },
  'frontend': { label: '/jarvis-fe',    cls: 'blue' },
  'backend':  { label: '/jarvis-be',    cls: 'green' },
  'lite':     { label: '/jarvis-lite',  cls: 'amber' },
};

/** 指令标签颜色 → Tailwind 类名映射 */
var COMMAND_COLORS = {
  indigo:  'bg-indigo-100 text-indigo-700',
  blue:    'bg-blue-100 text-blue-700',
  green:   'bg-emerald-100 text-emerald-700',
  amber:   'bg-amber-100 text-amber-700',
};

var allRuns = [];
var searchTerm = '';

/**
 * 加载归档列表
 */
async function loadArchivedRuns() {
  try {
    var resp = await fetch('/api/pipeline-runs/archived');
    var h = await fetch('/health');
    if (h.ok) {
      var hv = await h.json();
      document.getElementById('verNum').textContent = 'v' + hv.version;
    }
    if (!resp.ok) {
      showError('加载失败（HTTP ' + resp.status + '）');
      return;
    }
    var data = await resp.json();
    allRuns = data.runs || [];
    renderList();
  } catch (_) {
    showError('网络错误，无法加载归档记录');
  }
}

/**
 * 显示错误状态
 * @param {string} msg
 */
function showError(msg) {
  document.getElementById('archiveList').innerHTML =
    '<div class="text-center py-16 text-slate-400">' +
    '<i data-lucide="alert-circle" class="w-12 h-12 mx-auto mb-4 text-red-300"></i>' +
    '<p class="text-sm font-medium text-red-400">' + msg + '</p>' +
    '<button onclick="loadArchivedRuns()" class="mt-3 text-xs text-indigo-500 hover:text-indigo-600 font-medium">重新加载</button>' +
    '</div>';
  lucide.createIcons();
}

/**
 * 应用搜索过滤并重新渲染
 */
function applyFilter() {
  searchTerm = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  renderList();
}

/**
 * 按 session_id 分组渲染归档列表
 */
function renderList() {
  var filtered = allRuns;
  if (searchTerm) {
    filtered = allRuns.filter(function(r) {
      return (r.task_name || '').toLowerCase().includes(searchTerm) ||
             (r.session_id || '').toLowerCase().includes(searchTerm);
    });
  }

  document.getElementById('archiveCount').textContent = filtered.length + ' 条记录';

  if (filtered.length === 0) {
    document.getElementById('archiveList').innerHTML =
      '<div class="text-center py-16 text-slate-400">' +
      '<i data-lucide="archive" class="w-12 h-12 mx-auto mb-4 text-slate-300"></i>' +
      '<p class="text-sm font-medium">' + (searchTerm ? '未找到匹配的归档记录' : '暂无归档记录') + '</p>' +
      (searchTerm ? '<p class="text-xs mt-1 text-slate-400">尝试其他搜索词</p>' : '<p class="text-xs mt-1 text-slate-400">从流水线看板归档运行记录后，将在此处显示</p>') +
      '</div>';
    lucide.createIcons();
    return;
  }

  // 按 session_id 分组
  var groups = {};
  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];
    var sid = r.session_id || 'unknown';
    if (!groups[sid]) groups[sid] = [];
    groups[sid].push(r);
  }

  var html = '';
  for (var sid in groups) {
    var runs = groups[sid];
    var shortSid = sid.length > 18 ? sid.slice(0, 18) + '...' : sid;
    html += '<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">';
    // 分组标题
    html += '<div class="px-6 py-3 bg-slate-50 border-b border-slate-100 flex items-center gap-2.5">';
    html += '<i data-lucide="folder" class="w-4 h-4 text-slate-400"></i>';
    html += '<span class="text-xs font-medium text-slate-600 font-mono" title="' + sid + '">' + shortSid + '</span>';
    html += '<span class="text-[10px] text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">' + runs.length + ' 条</span>';
    html += '</div>';
    // Run 列表
    html += '<div class="divide-y divide-slate-100">';
    for (var j = 0; j < runs.length; j++) {
      var run = runs[j];
      var cmd = COMMAND_LABELS[run.pipeline_type] || { label: run.pipeline_type || '?', cls: 'indigo' };
      var cmdColor = COMMAND_COLORS[cmd.cls] || COMMAND_COLORS.indigo;
      var ptName = PIPELINE_NAMES[run.pipeline_type] || run.pipeline_type || '未知';

      // 任务名
      var taskDisplay = run.task_name || '（未命名）';
      var taskClass = run.task_name ? 'text-slate-700 font-medium' : 'text-slate-400 italic';

      // 日期格式化
      var dateText = '---';
      if (run.started_at) {
        try {
          var d = new Date(run.started_at.replace(' ', 'T'));
          dateText = d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
        } catch (_) {
          dateText = run.started_at.replace(/[<>&"']/g, '');
        }
      }

      // Run ID 缩略
      var shortRunId = (run.id || '').slice(0, 14) + '...';

      html += '<div class="flex items-center gap-4 px-6 py-3 hover:bg-slate-50/50 transition-colors">';
      html += '<div class="flex-1 min-w-0 flex items-center gap-3">';
      html += '<span class="text-xs ' + taskClass + ' truncate" title="' + (run.task_name || '') + '">' + taskDisplay + '</span>';
      html += '<span class="text-[10px] ' + cmdColor + ' px-1.5 py-px rounded font-mono flex-shrink-0">' + cmd.label + '</span>';
      html += '<span class="text-[10px] text-slate-500 bg-slate-100 px-1.5 py-px rounded font-mono flex-shrink-0">' + ptName + '</span>';
      html += '</div>';
      html += '<span class="text-[10px] text-slate-400 font-mono flex-shrink-0" title="Run ID: ' + run.id + '">' + shortRunId + '</span>';
      html += '<span class="text-[10px] text-slate-400 flex-shrink-0 font-mono">' + dateText + '</span>';
      html += '<span class="text-[10px] font-medium px-2 py-0.5 rounded-full flex-shrink-0 ' + getStatusBadge(run.status) + '">' + getStatusLabel(run.status) + '</span>';
      // 操作按钮
      html += '<div class="flex items-center gap-1.5 flex-shrink-0">';
      html += '<button onclick="restoreRun(\'' + run.id + '\')" class="text-[10px] text-indigo-500 hover:text-indigo-700 bg-indigo-50 hover:bg-indigo-100 px-2 py-1 rounded transition-colors font-medium" title="恢复到流水线看板">恢复</button>';
      html += '<button onclick="deleteArchivedRun(\'' + run.id + '\')" class="text-[10px] text-red-400 hover:text-red-600 bg-red-50 hover:bg-red-100 px-2 py-1 rounded transition-colors font-medium" title="永久删除">删除</button>';
      html += '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';
  }

  document.getElementById('archiveList').innerHTML = html;
  lucide.createIcons();
}

/**
 * 恢复归档 run
 * @param {string} runId
 */
async function restoreRun(runId) {
  try {
    var resp = await fetch('/api/pipeline-runs/' + encodeURIComponent(runId) + '/unarchive', { method: 'POST' });
    var data = await resp.json();
    if (data.ok) {
      toast('已恢复到流水线看板', true);
      loadArchivedRuns();
    } else {
      toast('恢复失败: ' + (data.error || '未知错误'), false);
    }
  } catch (_) {
    toast('恢复请求失败，请检查网络连接', false);
  }
}

/**
 * 删除归档 run（需确认）
 * @param {string} runId
 */
function deleteArchivedRun(runId) {
  if (!confirm('确认永久删除该归档记录？此操作不可恢复。')) return;
  fetch('/api/pipeline-runs/' + encodeURIComponent(runId), { method: 'DELETE' })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      if (data.ok) {
        toast('已删除归档记录', true);
        loadArchivedRuns();
      } else {
        toast('删除失败: ' + (data.error || '未知错误'), false);
      }
    })
    .catch(function() {
      toast('删除请求失败，请检查网络连接', false);
    });
}

/** 状态 → 中文标签 */
function getStatusLabel(status) {
  var map = { active: '运行中', completed: '已完成', aborted: '已终止' };
  return map[status] || status || '未知';
}

/** 状态 → Badge 样式 */
function getStatusBadge(status) {
  var map = {
    active: 'bg-emerald-50 text-emerald-700',
    completed: 'bg-slate-100 text-slate-600',
    aborted: 'bg-red-50 text-red-700',
  };
  return map[status] || 'bg-slate-100 text-slate-500';
}

function toast(msg, isSuccess) {
  var t = document.createElement('div');
  t.className = 'toast-in px-4 py-3 rounded-xl text-sm font-medium shadow-lg ' +
    (isSuccess !== false ? 'bg-emerald-600 text-white' : 'bg-red-500 text-white');
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(function() { t.remove(); }, 300); }, 3500);
}

// 初始加载
loadArchivedRuns();
lucide.createIcons();
</script>
</body>
</html>
