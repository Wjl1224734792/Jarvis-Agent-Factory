# Jarvis Engine Hooks for Codex CLI
# Agent spawns → hook calls jarvis hook gate-check
# Session stop → hook calls jarvis hook status

[features]
codex_hooks = true

[[hooks.PostToolUse]]
matcher = "^Bash$"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "jarvis hook gate-check"
timeout = 15
statusMessage = "Gate enforcement check"
