[agents.planner]
description = "任务→执行计划、分工与 Execution Packet"
config_file = "agents/planner.toml"

[agents.review_qa]
description = "需求一致性、实现质量与回归审查、追踪矩阵"
config_file = "agents/review_qa.toml"

[agents.repo_explorer]
description = "只读探索代码库结构与风险边界"
config_file = "agents/repo_explorer.toml"

