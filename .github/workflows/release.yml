name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --oneline --no-merges > release-notes.txt
          else
            git log --oneline --no-merges ${PREV_TAG}..HEAD > release-notes.txt
          fi
          echo "" >> release-notes.txt
          echo "---" >> release-notes.txt
          echo "Full Changelog: https://github.com/Wjl1224734792/Jarvis-Agent-Factory/blob/main/CHANGELOG.md" >> release-notes.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.txt
