version: '3.8'

services:
  redis:
    image: redis:8.4-alpine
    container_name: feijia-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass F3j!a_D3v_2026#rd
      --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
